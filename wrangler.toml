# Cloudflare Pages config. The cron trigger fires the weekly email digest
# (functions/api/digest/send.ts handles the batch run). If Pages cron isn't
# available on this plan, set up a small scheduled Worker (or external cron) to
# POST https://safesqlpro.dev/api/digest/send with the x-cron-secret header.
name = "safesql"
pages_build_output_dir = "dist"
compatibility_date = "2026-01-01"

[triggers]
crons = ["0 9 * * 1"] # Every Monday at 09:00 UTC
