name: SafeSQL Pro — Validate SQL
on:
  push:
    paths: ['test-queries/**/*.sql']
  pull_request:
    paths: ['test-queries/**/*.sql']

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate SQL with SafeSQL Pro
        uses: mpingosystems/safesql@v1
        with:
          sql_files: "test-queries/**/*.sql"
          schema_file: "test-queries/schema.sql"
          dialect: "postgresql"
